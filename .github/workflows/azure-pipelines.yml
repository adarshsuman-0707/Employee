name: .NET Build Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest   # use windows for IIS compatibility

    env:
      BUILD_CONFIGURATION: Release
      PUBLISH_DIR: ${{ github.workspace }}\publish

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup .NET
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Restore
      - name: Restore Packages
        run: dotnet restore

      # Build
      - name: Build Project
        run: dotnet build --configuration $BUILD_CONFIGURATION --no-restore

      # Publish
      - name: Publish Project
        run: dotnet publish -c $BUILD_CONFIGURATION -o $PUBLISH_DIR --no-build

      # Upload artifact (important replacement for Azure DevOps artifact staging)
      - name: Upload Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ${{ env.PUBLISH_DIR }}
