name: .NET Build Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: self-hosted   # 🔥 THIS IS THE KEY FIX

    env:
      BUILD_CONFIGURATION: Release
      PUBLISH_DIR: C:\publish-temp   # better than workspace

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore Packages
        run: dotnet restore

      - name: Build Project
        run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Publish Project
        run: dotnet publish **/*.csproj -c ${{ env.BUILD_CONFIGURATION }} -o ${{ env.PUBLISH_DIR }} --no-build

      - name: Copy to IIS Folder
        run: |
          xcopy /E /I /Y "${{ env.PUBLISH_DIR }}\*" "C:\inetpub\EmployeeApp\"

      - name: Restart IIS
        run: iisreset
