name: .NET Build Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: self-hosted   # 🔥 THIS IS THE KEY FIX
  publish:
    runs-on: self-hosted
    needs: build

    environment: production 
    env:
      BUILD_CONFIGURATION: Release
      PUBLISH_DIR: C:\publish-temp   # better than workspace

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore Packages
        run: dotnet restore

      - name: Build Project
        run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore
      - name: Show Project Files
        run: Get-ChildItem -Recurse -Filter *.csproj
   deploy:
     runs-on: self-hosted
     needs: publish
     steps:
      - name: Stop App Pool
        run: |
          Import-Module WebAdministration
          Stop-WebAppPool -Name "DefaultAppPool"
      - name: Publish Project
        run: |
          $proj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
          dotnet publish $proj.FullName -c ${{ env.BUILD_CONFIGURATION }} -o ${{ env.PUBLISH_DIR }} --no-build
      - name: Start App Pool
        run: |
          Import-Module WebAdministration
          Start-WebAppPool -Name "DefaultAppPool"
      - name: Restart IIS
        run: iisreset
